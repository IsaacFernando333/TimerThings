<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>PomoPica</title>
</head>
<body>
    <section class="principal">

        <div class="temas">
            <p><ion-icon class="icone-pincel" name="brush-outline"></ion-icon></p>
            <div class="temas-div">
                <input type="checkbox" id="pink" class="pink">
                <label for="pink">pink</label>
                <!-- <input type="checkbox" id="white" class="white">
                <label for="white">white</label> -->
                <input type="checkbox" id="dark" class="dark">
                <label for="dark">dark</label>
                <input type="checkbox" id="blue" class="blue">
                <label for="blue">blue</label>
            </div>
        </div>
        <div class="conteudo">
            <div class="timer">
                <p class="tempo">00:00:00</p>
                <div class="bts">
                    <button class="iniciar" >INICIAR</button>
                    <button class="pausar" >PAUSAR</button>
                    <button class="zerar" >ZERAR</button>
                </div>
            </div>
            <div class="data">
                <h1 class="titulo">TEMPO TOTAL:</h1>
                <p class="total">`Dias: 0 → Horas: 0 → Minutos: 0 → Segundos: 0`</p>
                <button class="definitivo"><ion-icon name="reload-outline"></ion-icon></button>
            </div>
        </div>

    </section>
    <section class="principal-2">
        <div class="criatarefa">
            <div class="inserindo">
                <div class="individual">
                    <label for="nome">NOME:</label>
                    <input type="text" name="nome" id="nome">
                </div>
                <div class="individual">
                    <label for="metaTempo">META (h):</label>
                    <input type="number">
                </div>
            </div>
            <div class="btnInserir">
                <ion-icon name="add-outline"></ion-icon>
            </div>
        </div>
    </section>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="./js/efeitos.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
